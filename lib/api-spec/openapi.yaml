openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AI Web Agent API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: agent
    description: AI Agent operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /agent/command:
    post:
      operationId: processCommand
      tags: [agent]
      summary: Process a Hinglish/English command
      description: Parse, normalize, and execute an AI agent command
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommandRequest"
      responses:
        "200":
          description: Command processed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agent/image-to-page:
    post:
      operationId: imageToPage
      tags: [agent]
      summary: Convert an uploaded image to a structured webpage
      description: Accepts a multipart image upload, analyzes layout with AI vision, and generates a complete multi-file project
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: Image file (PNG, JPG, WebP, GIF — max 10 MB)
                description:
                  type: string
                  description: Optional description to guide generation
                sessionId:
                  type: string
                  nullable: true
                pageType:
                  type: string
                  description: Override page type (used after clarification)
              required:
                - image
      responses:
        "200":
          description: Image analyzed and page generated (or clarification needed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageToPageResult"
        "400":
          description: No image uploaded or invalid file type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Analysis or generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agent/outputs:
    get:
      operationId: listOutputs
      tags: [agent]
      summary: List all generated output files
      responses:
        "200":
          description: List of output files
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutputList"

  /agent/preview/{filename}:
    get:
      operationId: previewOutput
      tags: [agent]
      summary: Get HTML content of a generated output file
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileContent"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agent/download/{zipFilename}:
    get:
      operationId: downloadProject
      tags: [agent]
      summary: Download a generated project as a ZIP file
      parameters:
        - name: zipFilename
          in: path
          required: true
          schema:
            type: string
          description: ZIP filename (e.g. login-project-1234567890.zip)
      responses:
        "200":
          description: ZIP file stream
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agent/status:
    get:
      operationId: getAgentStatus
      tags: [agent]
      summary: Get current agent system status
      responses:
        "200":
          description: Agent status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStatus"

  /agent/history:
    get:
      operationId: getCommandHistory
      tags: [agent]
      summary: Get recent command history
      responses:
        "200":
          description: Command history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandHistory"

  /agent/session/{sessionId}:
    get:
      operationId: getSession
      tags: [agent]
      summary: Get conversation session state
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationSession"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agent/session/{sessionId}/reset:
    post:
      operationId: resetSession
      tags: [agent]
      summary: Reset a conversation session to start a new task
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationSession"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agent/templates:
    get:
      operationId: listTemplates
      tags: [agent]
      summary: List available page templates
      responses:
        "200":
          description: Available templates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateList"

  /agent/extract:
    post:
      operationId: startExtraction
      tags: [agent]
      summary: Start a full-page extraction job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractRequest"
      responses:
        "200":
          description: Extraction job started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractJob"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agent/extracts:
    get:
      operationId: listExtractions
      tags: [agent]
      summary: List all past extraction jobs
      responses:
        "200":
          description: List of extraction jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractJobList"

  /agent/versions/{sessionId}:
    get:
      operationId: listVersionProjects
      tags: [agent]
      summary: List all versioned project types for a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of project base names with version histories
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      type: string
                required: [projects]

  /agent/versions/{sessionId}/{projectBase}:
    get:
      operationId: getVersionHistory
      tags: [agent]
      summary: Get full version history for a project type within a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
        - name: projectBase
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Version history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionHistory"
        "404":
          description: No versions found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agent/versions/{sessionId}/{projectBase}/rollback:
    post:
      operationId: rollbackVersion
      tags: [agent]
      summary: Rollback a project to a specific version
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
        - name: projectBase
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RollbackRequest"
      responses:
        "200":
          description: Rollback successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RollbackResult"
        "400":
          description: Invalid version ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session or project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agent/learning/{sessionId}:
    get:
      operationId: getLearningPreferences
      tags: [agent]
      summary: Get learned user preferences for a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User preferences learned from this session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningPreferences"

  /agent/extracts/{jobId}:
    get:
      operationId: getExtraction
      tags: [agent]
      summary: Get a single extraction job by ID
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Extraction job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractJob"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CommandRequest:
      type: object
      properties:
        command:
          type: string
          description: Natural language command in Hinglish or English
        researchMode:
          type: boolean
          description: Whether to enable internet research mode
          default: false
        sessionId:
          type: string
          nullable: true
          description: Session ID for conversation continuity
      required:
        - command

    ConversationTurn:
      type: object
      properties:
        id:
          type: string
        role:
          type: string
          enum: [user, agent]
        content:
          type: string
        timestamp:
          type: string
        outputFile:
          type: string
          nullable: true
        jobId:
          type: string
          nullable: true
        validationScore:
          type: integer
          nullable: true
        confidenceScore:
          type: integer
          nullable: true
        regenerated:
          type: boolean
        followUpQuestions:
          type: array
          items:
            type: string
      required:
        - id
        - role
        - content
        - timestamp

    CollectedConditions:
      type: object
      properties:
        pageType:
          type: string
          nullable: true
        colorScheme:
          type: string
          enum: [light, dark, auto]
          nullable: true
        uiStyle:
          type: array
          items:
            type: string
        hasValidation:
          type: boolean
          nullable: true
        hasNavbar:
          type: boolean
          nullable: true
        hasFooter:
          type: boolean
          nullable: true
        customNotes:
          type: array
          items:
            type: string
        mentionedFeatures:
          type: array
          items:
            type: string
        lastUrl:
          type: string
          nullable: true

    ConversationSession:
      type: object
      properties:
        sessionId:
          type: string
        startedAt:
          type: string
        lastActivityAt:
          type: string
        currentTask:
          type: string
          nullable: true
        taskState:
          type: string
          enum: [idle, collecting, generating, awaiting_feedback, refining, complete]
        collectedConditions:
          $ref: "#/components/schemas/CollectedConditions"
        turnCount:
          type: integer
        generatedOutputs:
          type: array
          items:
            type: string
        followUpQuestions:
          type: array
          items:
            type: string
        recentTurns:
          type: array
          items:
            $ref: "#/components/schemas/ConversationTurn"
      required:
        - sessionId
        - startedAt
        - lastActivityAt
        - taskState
        - collectedConditions
        - turnCount
        - generatedOutputs
        - followUpQuestions
        - recentTurns

    ValidationCheck:
      type: object
      properties:
        id:
          type: string
        category:
          type: string
          enum: [structure, css, js, accessibility, responsiveness, design-system]
        name:
          type: string
        status:
          type: string
          enum: [pass, fail, warn]
        detail:
          type: string
        weight:
          type: integer
      required:
        - id
        - category
        - name
        - status
        - detail
        - weight

    ValidationReport:
      type: object
      properties:
        passed:
          type: boolean
        score:
          type: integer
          description: 0–100 quality score
        grade:
          type: string
          enum: [A, B, C, D, F]
        checks:
          type: array
          items:
            $ref: "#/components/schemas/ValidationCheck"
        errors:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        suggestions:
          type: array
          items:
            type: string
        canAutoFix:
          type: boolean
      required:
        - passed
        - score
        - grade
        - checks
        - errors
        - warnings
        - suggestions
        - canAutoFix

    ConfidenceDimension:
      type: object
      properties:
        name:
          type: string
        score:
          type: integer
        weight:
          type: integer
        rationale:
          type: string
      required:
        - name
        - score
        - weight
        - rationale

    ConfidenceResult:
      type: object
      properties:
        overall:
          type: integer
          description: 0–100 weighted confidence score
        grade:
          type: string
          enum: [A, B, C, D, F]
        passesThreshold:
          type: boolean
        threshold:
          type: integer
        dimensions:
          type: array
          items:
            $ref: "#/components/schemas/ConfidenceDimension"
        recommendation:
          type: string
          enum: [use, regenerate, fallback]
        regenerationHint:
          type: string
          nullable: true
      required:
        - overall
        - grade
        - passesThreshold
        - threshold
        - dimensions
        - recommendation

    CommandResult:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [success, error, processing]
        normalizedCommand:
          type: string
          description: The normalized English interpretation of the command
        detectedIntent:
          type: string
          description: Detected intent (create, clone, research, analyze, etc.)
        detectedMode:
          type: string
          enum: [analyze, research, direct]
        detectedUrl:
          type: string
          nullable: true
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/TaskStep"
        outputFile:
          type: string
          nullable: true
          description: Generated output filename
        projectSlug:
          type: string
          nullable: true
          description: Packaged project slug (used for ZIP download)
        downloadUrl:
          type: string
          nullable: true
          description: URL to download the full runnable project as a ZIP
        message:
          type: string
        validationReport:
          nullable: true
          $ref: "#/components/schemas/ValidationReport"
        confidenceResult:
          nullable: true
          $ref: "#/components/schemas/ConfidenceResult"
        regenerated:
          type: boolean
          description: Whether the output was regenerated after a low confidence score
        sessionId:
          type: string
          description: Session ID for conversation continuity
        conversationIntent:
          type: string
          enum: [continue, new_task, explicit_reset, follow_up]
          description: Detected intent of this turn relative to the session
        agentMessage:
          type: string
          description: Human-readable agent response for the chat UI
        followUpQuestions:
          type: array
          items:
            type: string
          description: Suggested follow-up questions for the user
        session:
          $ref: "#/components/schemas/ConversationSession"
        responseMode:
          type: string
          enum: [generate, clarify, acknowledge]
          description: "generate = full output produced, clarify = asking user a question, acknowledge = confirming before generating"
        clarificationQuestion:
          type: string
          nullable: true
          description: The single clarification question to ask the user
        quickReplies:
          type: array
          items:
            type: string
          description: Tap-to-send quick reply chip suggestions
        acknowledgment:
          type: string
          nullable: true
          description: Natural acknowledgment opener shown before generating
        webResearchUsed:
          type: boolean
          description: Whether live web sources were fetched for this response
        webSources:
          type: array
          items:
            $ref: "#/components/schemas/WebSourceResult"
          description: Web sources consulted during research
        webCrossCheckedFacts:
          type: array
          items:
            type: string
          description: Facts confirmed by 2+ independent web sources
        webAdaptedPatterns:
          type: array
          items:
            type: string
          description: Project-aligned patterns adapted from web sources (never raw copy-paste)
        chatOperation:
          type: string
          nullable: true
          description: "Chat management operation performed: reset_chat | delete_last | delete_message | new_session"
        userTurnId:
          type: string
          nullable: true
          description: Server-side session turn ID for the user message in this exchange
        agentTurnId:
          type: string
          nullable: true
          description: Server-side session turn ID for the agent message in this exchange
        securityReport:
          nullable: true
          $ref: "#/components/schemas/SecurityReport"
        performanceReport:
          nullable: true
          $ref: "#/components/schemas/PerformanceReport"
        versionId:
          type: string
          nullable: true
          description: "Version ID of this generation (e.g. v1, v2, v3)"
        versionNumber:
          type: integer
          nullable: true
          description: Monotonically increasing version number for this project type in this session
        editApplied:
          type: boolean
          description: Whether this was a targeted edit applied to an existing output
      required:
        - jobId
        - status
        - normalizedCommand
        - detectedIntent
        - detectedMode
        - tasks
        - message
        - regenerated
        - sessionId
        - conversationIntent
        - agentMessage
        - followUpQuestions
        - session
        - responseMode
        - quickReplies

    TaskStep:
      type: object
      properties:
        step:
          type: integer
        name:
          type: string
        status:
          type: string
          enum: [pending, running, done, error, skipped]
        detail:
          type: string
          nullable: true
      required:
        - step
        - name
        - status

    OutputFile:
      type: object
      properties:
        filename:
          type: string
        pageType:
          type: string
        createdAt:
          type: string
        size:
          type: integer
        projectSlug:
          type: string
          nullable: true
          description: Packaged project slug for downloading
        downloadUrl:
          type: string
          nullable: true
          description: URL to download the full project ZIP
      required:
        - filename
        - pageType
        - createdAt
        - size

    OutputList:
      type: object
      properties:
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/OutputFile"
      required:
        - outputs

    FileContent:
      type: object
      properties:
        filename:
          type: string
        content:
          type: string
        pageType:
          type: string
      required:
        - filename
        - content
        - pageType

    AgentStatus:
      type: object
      properties:
        ready:
          type: boolean
        researchMode:
          type: boolean
        puppeteerAvailable:
          type: boolean
        totalOutputs:
          type: integer
        totalCommandsProcessed:
          type: integer
        systemInfo:
          type: object
          properties:
            platform:
              type: string
            nodeVersion:
              type: string
      required:
        - ready
        - researchMode
        - puppeteerAvailable
        - totalOutputs
        - totalCommandsProcessed

    CommandHistoryItem:
      type: object
      properties:
        id:
          type: string
        command:
          type: string
        normalizedCommand:
          type: string
        intent:
          type: string
        mode:
          type: string
        outputFile:
          type: string
          nullable: true
        status:
          type: string
        timestamp:
          type: string
      required:
        - id
        - command
        - normalizedCommand
        - intent
        - mode
        - status
        - timestamp

    CommandHistory:
      type: object
      properties:
        history:
          type: array
          items:
            $ref: "#/components/schemas/CommandHistoryItem"
      required:
        - history

    Template:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        pageType:
          type: string
        preview:
          type: string
      required:
        - id
        - name
        - description
        - pageType
        - preview

    TemplateList:
      type: object
      properties:
        templates:
          type: array
          items:
            $ref: "#/components/schemas/Template"
      required:
        - templates

    ExtractRequest:
      type: object
      properties:
        url:
          type: string
          description: The URL to extract
        waitForNetworkIdle:
          type: boolean
          default: true
          description: Wait for network to be idle before extracting
        executeJs:
          type: boolean
          default: true
          description: Allow JavaScript execution for full render
      required:
        - url

    ExtractAsset:
      type: object
      properties:
        originalUrl:
          type: string
        localPath:
          type: string
        type:
          type: string
          enum: [css, js, image, font, other]
        sizeBytes:
          type: integer
        downloaded:
          type: boolean
      required:
        - originalUrl
        - localPath
        - type
        - sizeBytes
        - downloaded

    ExtractJob:
      type: object
      properties:
        jobId:
          type: string
        url:
          type: string
        status:
          type: string
          enum: [running, success, partial, error]
        message:
          type: string
        timestamp:
          type: string
        previewPath:
          type: string
          nullable: true
          description: URL path to preview the extracted page
        outputDir:
          type: string
          nullable: true
        assets:
          type: array
          items:
            $ref: "#/components/schemas/ExtractAsset"
        stats:
          type: object
          properties:
            totalAssets:
              type: integer
            downloaded:
              type: integer
            failed:
              type: integer
            htmlSize:
              type: integer
          required:
            - totalAssets
            - downloaded
            - failed
            - htmlSize
      required:
        - jobId
        - url
        - status
        - message
        - timestamp
        - assets
        - stats

    ExtractJobList:
      type: object
      properties:
        extractions:
          type: array
          items:
            $ref: "#/components/schemas/ExtractJob"
      required:
        - extractions

    WebSourceResult:
      type: object
      properties:
        url:
          type: string
        domain:
          type: string
        title:
          type: string
        relevanceScore:
          type: number
        qualityScore:
          type: number
        headings:
          type: array
          items:
            type: string
        fetchedAt:
          type: string
      required:
        - url
        - domain
        - title
        - relevanceScore
        - qualityScore

    ImageToPageResult:
      type: object
      properties:
        responseMode:
          type: string
          enum: [generate, clarify]
        agentMessage:
          type: string
          nullable: true
        clarificationQuestion:
          type: string
          nullable: true
        quickReplies:
          type: array
          items:
            type: string
        sessionId:
          type: string
          nullable: true
        imageUploadId:
          type: string
          nullable: true
        projectSlug:
          type: string
          nullable: true
        downloadUrl:
          type: string
          nullable: true
        pageType:
          type: string
          nullable: true
        colorScheme:
          type: string
          nullable: true
        confidence:
          type: number
          nullable: true
        detectedElements:
          type: array
          items:
            type: string
        description:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        fileCount:
          type: integer
          nullable: true
        files:
          type: array
          items:
            type: string
      required:
        - responseMode

    SecurityIssue:
      type: object
      properties:
        id:
          type: string
        severity:
          type: string
          enum: [critical, high, medium, low, info]
        type:
          type: string
        description:
          type: string
        pattern:
          type: string
        suggestion:
          type: string
        autoFixed:
          type: boolean
      required: [id, severity, type, description, pattern, suggestion, autoFixed]

    SecurityReport:
      type: object
      properties:
        safe:
          type: boolean
        score:
          type: integer
          description: 0–100 (100 = no issues)
        issues:
          type: array
          items:
            $ref: "#/components/schemas/SecurityIssue"
        blockedCount:
          type: integer
        summary:
          type: string
      required: [safe, score, issues, blockedCount, summary]

    PerformanceOptimization:
      type: object
      properties:
        id:
          type: string
        category:
          type: string
          enum: [css, html, js, assets, hints]
        description:
          type: string
        bytesSaved:
          type: integer
      required: [id, category, description, bytesSaved]

    PerformanceReport:
      type: object
      properties:
        score:
          type: integer
          description: 0–100
        grade:
          type: string
          enum: [A, B, C, D, F]
        originalSizeBytes:
          type: integer
        optimizedSizeBytes:
          type: integer
        reductionBytes:
          type: integer
        reductionPercent:
          type: integer
        optimizationsApplied:
          type: array
          items:
            $ref: "#/components/schemas/PerformanceOptimization"
        summary:
          type: string
      required: [score, grade, originalSizeBytes, optimizedSizeBytes, reductionBytes, reductionPercent, optimizationsApplied, summary]

    ProjectVersionSummary:
      type: object
      properties:
        versionId:
          type: string
        versionNumber:
          type: integer
        command:
          type: string
        changesSummary:
          type: string
        linesAdded:
          type: integer
        linesRemoved:
          type: integer
        createdAt:
          type: string
        scores:
          type: object
          properties:
            validation:
              type: integer
            confidence:
              type: integer
            security:
              type: integer
            performance:
              type: integer
      required: [versionId, versionNumber, command, changesSummary, linesAdded, linesRemoved, createdAt]

    VersionHistory:
      type: object
      properties:
        projectBaseName:
          type: string
        sessionId:
          type: string
        currentVersion:
          type: integer
        currentVersionId:
          type: string
        totalVersions:
          type: integer
        versions:
          type: array
          items:
            $ref: "#/components/schemas/ProjectVersionSummary"
        lastUpdated:
          type: string
      required: [projectBaseName, sessionId, currentVersion, currentVersionId, totalVersions, versions, lastUpdated]

    RollbackRequest:
      type: object
      properties:
        versionId:
          type: string
          description: "The version ID to rollback to (e.g. v1, v2)"
      required: [versionId]

    RollbackResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        versionId:
          type: string
          nullable: true
        htmlContent:
          type: string
          nullable: true
      required: [success, message]

    LearningPreferences:
      type: object
      properties:
        sessionId:
          type: string
        colorScheme:
          type: string
          enum: [dark, light, auto]
        prefersDarkMode:
          type: boolean
        preferredStyles:
          type: array
          items:
            type: string
        preferredPageTypes:
          type: object
          additionalProperties:
            type: integer
        avgValidationScore:
          type: integer
        avgConfidenceScore:
          type: integer
        totalGenerations:
          type: integer
        regenerationCount:
          type: integer
        feedbackKeywords:
          type: array
          items:
            type: string
        lastGeneratedAt:
          type: string
      required: [sessionId, colorScheme, prefersDarkMode, preferredStyles, preferredPageTypes, totalGenerations]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: string
          nullable: true
      required:
        - error
