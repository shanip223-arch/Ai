kind = "web"
previewPath = "/"
title = "AI Web Agent"
version = "1.0.0"
id = "artifacts/web-agent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24020

[services.development]
run = "pnpm --filter @workspace/web-agent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/web-agent", "run", "build" ]
publicDir = "artifacts/web-agent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24020"
BASE_PATH = "/"
