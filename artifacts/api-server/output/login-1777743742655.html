<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>/* =============================================
 * Design Tokens — CSS Custom Properties
 * Edit these to retheme the entire project.
 * ============================================= */
:root {
  --color-primary: #6366f1;
  --color-secondary: #8b5cf6;
  --color-bg: #ffffff;
  --color-surface: #f8fafc;
  --color-text: #0f172a;
  --color-text-muted: #64748b;
  --color-border: #e2e8f0;
  --color-success: #10b981;
  --color-error: #ef4444;
  --color-warning: #f59e0b;
  --border-radius: 0.5rem;
  --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08);
  --font-body: Inter, system-ui, sans-serif;
  --font-mono: JetBrains Mono, Fira Code, monospace;
  --spacing-1: 4px;
  --spacing-2: 8px;
  --spacing-3: 12px;
  --spacing-4: 16px;
  --spacing-5: 24px;
  --spacing-6: 32px;
  --spacing-7: 48px;
  --spacing-8: 64px;
}

/* Base Styles — Reset + Element Defaults + Animations */
@import url('variables.css');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-body);
  background-color: var(--color-bg);
  color: var(--color-text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

a {
  color: var(--color-primary);
  text-decoration: none;
}
a:hover { text-decoration: underline; }

img { max-width: 100%; display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes slideInLeft {
  from { transform: translateX(-20px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.5; }
}

.animate-in        { animation: fadeIn 0.4s ease forwards; }
.animate-slide-in  { animation: slideInLeft 0.3s ease forwards; }

/* Component Library — Reusable UI Elements */
@import url('variables.css');

/* ── Layout ─────────────────────────────────── */
.container {
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 var(--spacing-5);
}

.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--spacing-5); }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--spacing-5); }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--spacing-5); }

@media (max-width: 768px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
}

/* ── Buttons ─────────────────────────────────── */
button, .btn {
  cursor: pointer;
  font-family: inherit;
  border: none;
  outline: none;
  transition: all 0.2s ease;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--spacing-2);
  padding: var(--spacing-3) var(--spacing-5);
  border-radius: var(--border-radius);
  font-size: 0.95rem;
  font-weight: 600;
  border: 1.5px solid transparent;
}

.btn-primary {
  background: var(--color-primary);
  color: #fff;
  border-color: var(--color-primary);
}
.btn-primary:hover {
  background: color-mix(in srgb, var(--color-primary) 85%, black);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.btn-secondary {
  background: transparent;
  color: var(--color-primary);
  border-color: var(--color-primary);
}
.btn-secondary:hover {
  background: color-mix(in srgb, var(--color-primary) 10%, transparent);
}

.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* ── Forms ───────────────────────────────────── */
input, textarea, select {
  font-family: inherit;
  font-size: 1rem;
  outline: none;
  border: 1.5px solid var(--color-border);
  border-radius: var(--border-radius);
  background: var(--color-surface);
  color: var(--color-text);
  padding: var(--spacing-3) var(--spacing-4);
  width: 100%;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

input:focus, textarea:focus, select:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--color-primary) 20%, transparent);
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-2);
  margin-bottom: var(--spacing-4);
}

.form-label {
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--color-text);
}

.form-error {
  font-size: 0.8rem;
  color: var(--color-error);
  margin-top: 2px;
  display: none;
}

.input-invalid { border-color: var(--color-error) !important; }
.input-valid   { border-color: var(--color-success) !important; }

/* ── Cards ───────────────────────────────────── */
.card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: calc(var(--border-radius) * 1.5);
  padding: var(--spacing-5);
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s ease, transform 0.2s ease;
}
.card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

/* ── Badges ──────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
}
.badge-success { background: color-mix(in srgb, var(--color-success) 15%, transparent); color: var(--color-success); }
.badge-warning { background: color-mix(in srgb, var(--color-warning) 15%, transparent); color: var(--color-warning); }
.badge-error   { background: color-mix(in srgb, var(--color-error)   15%, transparent); color: var(--color-error); }
.badge-primary { background: color-mix(in srgb, var(--color-primary) 15%, transparent); color: var(--color-primary); }

/* ── Navigation ──────────────────────────────── */
.navbar {
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  padding: 0 var(--spacing-5);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(8px);
}
.navbar-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}
.navbar-logo {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--color-primary);
  text-decoration: none;
}
.navbar-links { display: flex; align-items: center; gap: var(--spacing-4); }
.navbar-link  { color: var(--color-text-muted); font-size: 0.9rem; transition: color 0.2s; text-decoration: none; }
.navbar-link:hover { color: var(--color-text); text-decoration: none; }

/* ── Footer ──────────────────────────────────── */
.footer {
  background: var(--color-surface);
  border-top: 1px solid var(--color-border);
  padding: var(--spacing-7) var(--spacing-5);
  margin-top: var(--spacing-7);
}
.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: var(--spacing-4);
}
.footer-copy  { color: var(--color-text-muted); font-size: 0.875rem; }
.footer-links { display: flex; gap: var(--spacing-4); }
.footer-links a { color: var(--color-text-muted); font-size: 0.875rem; }

/* ── Tables ──────────────────────────────────── */
table { width: 100%; border-collapse: collapse; }
th {
  padding: var(--spacing-3) var(--spacing-5);
  text-align: left;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  background: color-mix(in srgb, var(--color-surface) 50%, var(--color-bg));
}
td {
  padding: var(--spacing-4) var(--spacing-5);
  border-top: 1px solid var(--color-border);
  font-size: 0.9rem;
}
tr:hover td { background: color-mix(in srgb, var(--color-primary) 4%, transparent); }

/* ── Toast Notifications ─────────────────────── */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.toast {
  padding: 12px 20px;
  border-radius: var(--border-radius);
  font-size: 0.9rem;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  animation: fadeIn 0.3s ease;
  max-width: 320px;
}
.toast-success { background: var(--color-success); color: #fff; }
.toast-error   { background: var(--color-error);   color: #fff; }
.toast-info    { background: var(--color-primary);  color: #fff; }

/* Login Page — Layout & Specific Styles */
@import url('variables.css');

.login-root {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--color-bg);
  padding: var(--spacing-5);
}

.login-card {
  width: 100%;
  max-width: 420px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: 16px;
  padding: var(--spacing-7) var(--spacing-6);
  box-shadow: var(--shadow-lg);
  animation: fadeIn 0.4s ease;
}

.login-logo { text-align: center; margin-bottom: var(--spacing-6); }
.login-logo h1 { font-size: 1.75rem; font-weight: 800; color: var(--color-primary); }
.login-logo p  { color: var(--color-text-muted); font-size: 0.9rem; margin-top: 4px; }

.divider { display: flex; align-items: center; gap: var(--spacing-3); margin: var(--spacing-4) 0; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--color-border); }
.divider span { color: var(--color-text-muted); font-size: 0.8rem; }

.forgot-link { text-align: right; margin-bottom: var(--spacing-4); }
.forgot-link a { font-size: 0.8rem; color: var(--color-primary); }

.login-footer { text-align: center; margin-top: var(--spacing-4); font-size: 0.875rem; color: var(--color-text-muted); }

.social-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--spacing-3);
  padding: var(--spacing-3) var(--spacing-5);
  border: 1.5px solid var(--color-border);
  border-radius: var(--border-radius);
  background: var(--color-surface);
  color: var(--color-text);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}
.social-btn:hover { border-color: var(--color-primary); background: color-mix(in srgb, var(--color-primary) 5%, var(--color-surface)); }</style>
</head>

</div>

// ── DOM Shortcuts ─────────────────────────────
const $ = (sel, ctx = document) => ctx.querySelector(sel);
const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

// ── Toast Notification System ─────────────────
let _toastContainer = null;

function getToastContainer() {
  if (!_toastContainer) {
    _toastContainer = document.createElement('div');
    _toastContainer.className = 'toast-container';
    document.body.appendChild(_toastContainer);
  }
  return _toastContainer;
}

function showToast(message, type = 'info', duration = 3500) {
  const container = getToastContainer();
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(100%)';
    toast.style.transition = 'all 0.3s ease';
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

// ── API Fetch Wrapper ─────────────────────────
async function apiFetch(url, options = {}) {
  try {
    const res = await fetch(url, {
      headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
      ...options,
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ message: res.statusText }));
      throw new Error(err.message || `Request failed: ${res.status}`);
    }
    return res.json();
  } catch (err) {
    showToast(err.message || 'Something went wrong', 'error');
    throw err;
  }
}

// ── Local Storage Helpers ─────────────────────
const storage = {
  get: (key, fallback = null) => {
    try { return JSON.parse(localStorage.getItem(key)) ?? fallback; }
    catch { return fallback; }
  },
  set: (key, value) => {
    try { localStorage.setItem(key, JSON.stringify(value)); }
    catch { /* quota exceeded or private mode */ }
  },
  remove: (key) => localStorage.removeItem(key),
};

// ── Debounce ──────────────────────────────────
function debounce(fn, delay = 300) {
  let timer;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => fn(...args), delay);
  };
}

// ── Format Helpers ────────────────────────────
function formatDate(iso) {

function formatCurrency(amount, currency = 'INR') {
